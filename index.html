<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Table Ordering System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="index.css">
</head>
<body class="login-bg">
    <main class="page-shell">
        <section class="glass text-center mx-auto login-card">
            <div class="board-container">
                <div class="board">SMART TABLE ORDERING SYSTEM</div>
            </div>

            <p class="lead mb-2">Premium Digital Dining Experience</p>

            <form id="loginForm" class="mt-4">
                <input type="text" id="username" class="form-control mt-3" placeholder="Enter Your Name">
                <input type="tel" id="phoneNo" class="form-control mt-3" placeholder="Enter Phone Number">
                <input type="number" id="tableNo" class="form-control mt-3" placeholder="Enter Table Number">
                <p id="returningNote" class="small mt-3 mb-0 muted-note"></p>

                <button type="submit" class="btn btn-premium mt-4 w-100">Enter Restaurant</button>
            </form>
        </section>
    </main>

    <script src="script.js" defer></script>
    <script src="db.js" defer></script>
    <script src="login.js" defer></script>
</body>
</html>
