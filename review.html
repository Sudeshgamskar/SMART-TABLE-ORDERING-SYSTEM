<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review | Smart Table Ordering System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="review.css">
</head>
<body class="review-bg">
    <main class="page-shell review-page-shell">
        <section class="review-page-card">
            <div class="review-toolbar d-flex justify-content-between align-items-start gap-3 flex-wrap">
                <div>
                    <h3 class="mb-1">Rate Your Experience</h3>
                    <p id="reviewPageStatus" class="section-lead mb-0">Loading your bill details...</p>
                </div>

                <button id="reviewDoneBtn" class="btn btn-outline-light" type="button">New Order</button>
            </div>

            <div id="reviewContent" class="review-content"></div>
        </section>
    </main>

    <script src="script.js" defer></script>
    <script src="db.js" defer></script>
    <script src="review.js" defer></script>
</body>
</html>
