<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment | Smart Table Ordering System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="payment.css">
</head>
<body class="payment-bg">
    <main class="page-shell payment-page-shell">
        <section id="paymentCard" class="payment-card text-center">
            <h3 class="mb-3">Payment Step</h3>

            <div class="upi-logos mb-3">
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/f2/Google_Pay_Logo.svg" height="35" alt="Google Pay">
            </div>

            <h4>Total Amount: Rs <span id="payAmount"></span></h4>

            <div class="payment-note mt-4">
                <h5 class="mb-2">QR On Next Bill Page</h5>
                <p class="mb-0 small-text">Tap the button below to open the saved bill. The customer QR code and review section will appear there.</p>
            </div>

            <button id="finishBtn" class="btn btn-success mt-4 w-100">Open Bill</button>
        </section>
    </main>

    <script src="script.js" defer></script>
    <script src="db.js" defer></script>
    <script src="payment.js" defer></script>
</body>
</html>
