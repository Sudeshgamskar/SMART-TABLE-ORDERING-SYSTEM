<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill | Smart Table Ordering System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="bill.css">
</head>
<body class="bill-bg">
    <main class="page-shell bill-page-shell">
        <section class="bill-page-card">
            <div class="bill-toolbar d-flex justify-content-between align-items-start gap-3 flex-wrap">
                <div>
                    <h3 id="billHeading" class="mb-1">Bill</h3>
                    <p id="billStatus" class="section-lead mb-0">Loading bill details...</p>
                </div>

                <div class="d-flex gap-2 flex-wrap">
                    <button id="printBillBtn" class="btn btn-success" type="button">Print Bill</button>
                    <button id="doneBtn" class="btn btn-outline-light" type="button">New Order</button>
                </div>
            </div>

            <div id="billContent" class="bill-content"></div>
        </section>
    </main>

    <script src="script.js" defer></script>
    <script src="db.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
    <script src="bill.js" defer></script>
</body>
</html>
